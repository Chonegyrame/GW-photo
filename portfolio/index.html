<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GW Photo - Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #f0ece4;
      --gold: #c9a96e;
      --dark: #121212;
      --panel: #161616;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--dark);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 36px 56px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.42), rgba(0,0,0,0));
    }

    .nav-links {
      display: flex;
      gap: 44px;
      list-style: none;
    }

    .nav-links a {
      font-size: 10.5px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(240,236,228,0.85);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-links a:hover { color: var(--gold); }

    .nav-logo {
      text-decoration: none;
      text-align: center;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-logo .name {
      font-family: 'Bodoni Moda', serif;
      font-weight: 300;
      font-size: 22px;
      letter-spacing: 0.18em;
      color: var(--white);
      display: block;
    }

    .nav-logo .tagline {
      font-size: 8px;
      font-weight: 200;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      display: block;
      margin-top: 4px;
    }

    .preview-wrap {
      min-height: 100vh;
      padding-top: 72px;
      background: var(--panel);
      scroll-margin-top: 110px;
    }

    .wildlife-link {
      width: 100%;
      aspect-ratio: 1920 / 700;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      background-image:
        linear-gradient(to bottom, rgba(0,0,0,0.20), rgba(0,0,0,0.46)),
        url('../images/blames liten.jpg');
      background-size: cover;
      background-position: center 48%;
      cursor: pointer;
      padding: 0 0 clamp(18px, 4vw, 56px) clamp(20px, 5vw, 56px);
    }

    .wildlife-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0.26) 100%);
      pointer-events: none;
    }

    .wildlife-link::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .wildlife-title {
      position: relative;
      z-index: 1;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(34px, 4.5vw, 64px);
      font-style: italic;
      font-weight: 300;
      letter-spacing: 0.02em;
      color: var(--gold);
      line-height: 1;
      text-align: left;
    }

    @media (max-width: 768px) {
      nav { padding: 24px 24px; }
      .nav-links { display: none; }
      .preview-wrap { padding-top: 40px; }
    }
  </style>
</head>
<body>
  <nav>
    <ul class="nav-links">
      <li><a href="../index.html#home-hero">Home</a></li>
      <li><a href="./index.html">Portfolio</a></li>
    </ul>
    <a class="nav-logo" href="../index.html#home-hero" aria-label="Go to home">
      <span class="name">GW Photo</span>
      <span class="tagline">Wildlife &middot; Birds</span>
    </a>
    <ul class="nav-links">
      <li><a href="../index.html#about">About</a></li>
      <li><a href="../swedish-wildlife/index.html">Enter Gallery</a></li>
    </ul>
  </nav>

  <section class="preview-wrap" id="portfolio-preview">
    <a class="wildlife-link" href="../swedish-wildlife/index.html" aria-label="Open Swedish Wildlife gallery">
      <span class="wildlife-title">Swedish Wildlife</span>
    </a>
  </section>
</body>
</html>
