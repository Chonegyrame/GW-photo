  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #f0ece4;
      --gold: #c9a96e;
      --dark: #121212;
      --panel: #161616;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--dark);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 36px 56px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.42), rgba(0,0,0,0));
    }

    .nav-links {
      display: flex;
      gap: 44px;
      list-style: none;
    }

    .nav-links a {
      font-size: 10.5px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(240,236,228,0.85);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-links a:hover { color: var(--gold); }

    .nav-logo {
      text-decoration: none;
      text-align: center;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-logo .name {
      font-family: 'Bodoni Moda', serif;
      font-weight: 300;
      font-size: 24px;
      letter-spacing: 0.18em;
      color: var(--white);
      display: block;
    }

    .nav-logo .tagline {
      font-size: 9px;
      font-weight: 200;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      display: block;
      margin-top: 4px;
    }

    .portfolio {
      padding: 120px 56px;
      background: var(--panel);
      scroll-margin-top: 110px;
    }
.portfolio-gallery {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .portfolio-rows {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .portfolio-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      align-items: start;
    }

    .portfolio-row.row-feature {
      grid-template-columns: 1.15fr 0.95fr 1fr;
    }

    .portfolio-column {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .portfolio-card {
      position: relative;
      width: 100%;
      overflow: hidden;
      cursor: pointer;
      border-radius: 2px;
    }

    .portfolio-card.size-hero { height: 760px; }
    .portfolio-card.size-hero-compact { height: 500px; }
    .portfolio-card.size-tall { height: 560px; }
    .portfolio-card.size-tall-soft { height: 520px; }
    .portfolio-card.size-large { height: 480px; }
    .portfolio-card.size-large-soft { height: 400px; }
    .portfolio-card.size-medium { height: 300px; }
    .portfolio-card.size-medium-tall { height: 320px; }
    .portfolio-card.size-medium-soft { height: 250px; }
    .portfolio-card.size-small { height: 210px; }
    .portfolio-card.size-solo { height: 620px; }

    .portfolio-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center center;
      filter: brightness(0.88) saturate(0.9);
      transition: transform 0.7s ease, filter 0.5s ease;
    }

    .portfolio-card.focus-center img { object-position: center center; }
    .portfolio-card.focus-top img { object-position: center 22%; }
    .portfolio-card.focus-left img { object-position: 40% 50%; }
    .portfolio-card.focus-stjartmesal img { object-position: 40% 50%; }
    .portfolio-card.focus-right img { object-position: 42% 50%; }
    .portfolio-card.focus-stjartmes img { object-position: 58% 48%; }
    .portfolio-card.focus-koltrast img { object-position: 44% 50%; }
    .portfolio-card.focus-radjur img { object-position: 34% 48%; }
    .portfolio-card.fit-contain img { object-fit: contain; }

    .portfolio-card:hover img {
      transform: scale(1.02);
      filter: brightness(1) saturate(1.05);
    }
.portfolio-row-single { grid-template-columns: 1fr; }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open { display: flex; overflow: hidden; }
    .lightbox.open.zoomed .lightbox-close { position: fixed; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: cover;
      cursor: zoom-in;
      transform-origin: 0 0;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
      -webkit-user-drag: none;
      touch-action: none;
    }

    .lightbox img.zoomed { cursor: grab; }
    .lightbox img.dragging {
      cursor: grabbing;
      transition: none;
    }

    .lightbox-close {
      position: absolute;
      top: 32px;
      right: 40px;
      background: none;
      border: none;
      color: var(--white);
      font-size: 28px;
      cursor: pointer;
      font-weight: 200;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .lightbox-close:hover { opacity: 1; }

    @media (max-width: 1024px) {
      .portfolio-row { grid-template-columns: repeat(2, 1fr); }
      .portfolio-row.row-feature { grid-template-columns: repeat(2, 1fr); }
      .portfolio-row-single { grid-template-columns: 1fr; }

      .mobile-home-link {

      .portfolio-card.focus-koltrast img { object-position: 34% 50%; }
      .portfolio { padding: 88px 24px; }
      .portfolio-row { grid-template-columns: 1fr; }
      .portfolio-row.row-feature { grid-template-columns: 1fr; }
      /* Mobile card heights — ~25% reduction from desktop */
      .portfolio-card.size-hero { height: 570px; }
      .portfolio-card.size-solo { height: 465px; }
      .portfolio-card.size-tall { height: 420px; }
      .portfolio-card.size-hero-compact { height: 375px; }
      .portfolio-card.size-tall-soft { height: 390px; }
      .portfolio-card.size-large { height: 360px; }
      .portfolio-card.size-large-soft { height: 300px; }
      .portfolio-card.size-medium { height: 225px; }
      .portfolio-card.size-medium-tall { height: 240px; }
      .portfolio-card.size-medium-soft { height: 188px; }
      .portfolio-card.size-small { height: 158px; }
    }

  <script>
    const portfolioImages = {
      stjartmesInsekt: { src: '../images/long-tailed-tit-with-insect.jpg', alt: 'Long-tailed tit carrying an insect' },
      ekorre: { src: '../images/red-squirrel.jpg', alt: 'Red squirrel on a tree branch' },
      skaggmes: { src: '../images/bearded-reedling.jpg', alt: 'Bearded reedling perched in reeds' },
      spillkraka: { src: '../images/spillkraka.jpg', alt: 'Black woodpecker calling on a mossy log' },
      notvacka: { src: '../images/eurasian-nuthatch.jpg', alt: 'Eurasian nuthatch on tree bark' },
      tofsmes: { src: '../images/crested-tit.jpg', alt: 'Crested tit perched in conifer forest' },
      blames: { src: '../images/eurasian-jay.jpg', alt: 'Eurasian jay perched on a mossy branch' },
      steglits: { src: '../images/european-goldfinch.jpg', alt: 'European goldfinch among winter branches' },
      tornfalk: { src: '../images/common-kestrel.jpg', alt: 'Common kestrel portrait in natural light' },
      isISol: { src: '../images/crow-on-ice.jpg', alt: 'Crow standing on ice in winter' },
      koltrastISno: { src: '../images/common-blackbird-in-snow.jpg', alt: 'Common blackbird in falling snow' },
      mindreHackspett: { src: '../images/lesser-spotted-woodpecker.jpg', alt: 'Lesser spotted woodpecker on tree trunk' },
      radjur: { src: '../images/roe-deer.jpg', alt: 'Roe deer in a forest clearing' },
      kor: { src: '../images/cattle-in-morning-mist.jpg', alt: 'Cattle in morning mist at dawn' },
      stenknack: { src: '../images/hawfinch.jpg', alt: 'Hawfinch close-up portrait' },
      stjartmesIAl: { src: '../images/long-tailed-tit-in-alder.jpg', alt: 'Long-tailed tit in alder branches' },
      storhack: { src: '../images/great-spotted-woodpecker.jpg', alt: 'Great spotted woodpecker close-up' },
      entita: { src: '../images/willow-tit.jpg', alt: 'Willow tit foraging on the forest floor' },
      gardsmyg: { src: '../images/eurasian-wren.jpg', alt: 'Eurasian wren clinging to tree bark' },
      svartvitFS: { src: '../images/svartvit%20FS.jpg', alt: 'European pied flycatcher portrait' },
      goktyta: { src: '../images/goktyta.jpg', alt: 'Eurasian wryneck on a branch' },
      duvhok: { src: '../images/duvhok.jpg', alt: 'Northern goshawk in flight' }
    };

    const portfolioRows = [
      {
        className: 'row-feature',
        columns: [
          [
            { key: 'svartvitFS', size: 'hero-compact', focus: 'left' },
            { key: 'tofsmes', size: 'large' },
            { key: 'ekorre', size: 'medium', focus: 'center' },
            { key: 'stjartmesInsekt', size: 'large', focus: 'stjartmes' },
            { key: 'radjur', size: 'tall-soft', focus: 'radjur' },
            { key: 'storhack', size: 'large', focus: 'center' }
          ],
          [
            { key: 'stjartmesIAl', size: 'large-soft', focus: 'stjartmesal' },
            { key: 'skaggmes', size: 'medium' },
            { key: 'duvhok', size: 'tall', focus: 'center' },
            { key: 'notvacka', size: 'medium' },
            { key: 'kor', size: 'medium' },
            { key: 'tornfalk', size: 'medium' },
            { key: 'entita', size: 'small', focus: 'center' },
            { key: 'isISol', size: 'medium-soft', focus: 'center' }
          ],
          [
            { key: 'spillkraka', size: 'medium' },
            { key: 'goktyta', size: 'medium', focus: 'center' },
            { key: 'steglits', size: 'medium' },
            { key: 'gardsmyg', size: 'medium-tall' },
            { key: 'blames', size: 'medium' },
            { key: 'koltrastISno', size: 'tall', focus: 'koltrast' },
            { key: 'mindreHackspett', size: 'medium' },
            { key: 'stenknack', size: 'tall' }
          ]
        ]
      }
    ];

    function createPortfolioCard(config) {
      const image = portfolioImages[config.key];
      if (!image) return null;

      const card = document.createElement('div');
      const focusClass = config.focus ? ` focus-${config.focus}` : '';
      const fitClass = config.fit ? ` fit-${config.fit}` : '';
      card.className = `portfolio-card size-${config.size}${focusClass}${fitClass}`;
      card.onclick = () => openLightbox(card);

      const img = document.createElement('img');
      img.src = image.src;
      img.alt = image.alt;
      img.loading = 'lazy';
      img.decoding = 'async';
      card.appendChild(img);
      return card;
    }

    function renderPortfolio(rows) {
      const root = document.getElementById('portfolioRows');
      if (!root) return;
      root.innerHTML = '';

      rows.forEach(row => {
        if (row.single) {
          const section = document.createElement('div');
          section.className = 'portfolio-row portfolio-row-single';
          const card = createPortfolioCard(row.single);
          if (card) section.appendChild(card);
          root.appendChild(section);
          return;
        }

        const section = document.createElement('div');
        section.className = `portfolio-row${row.className ? ` ${row.className}` : ''}`;

        row.columns.forEach(columnCards => {
          const column = document.createElement('div');
          column.className = 'portfolio-column';

          columnCards.forEach(cardConfig => {
            const card = createPortfolioCard(cardConfig);
            if (card) column.appendChild(card);
          });

          section.appendChild(column);
        });

        root.appendChild(section);
      });
    }

    function getPortfolioRowsForViewport() {
      const isMobile = window.matchMedia('(max-width: 768px)').matches;
      if (!isMobile) return portfolioRows;

      // Mobile: interleave columns left-to-right so the visit order is
      // col1[0], col2[0], col3[0], col1[1], col2[1], col3[1], ...
      // instead of stacking each column's full contents in turn.
      return portfolioRows.map(row => {
        if (!row.columns) return row;
        const maxLen = Math.max(...row.columns.map(c => c.length));
        const interleaved = [];
        for (let i = 0; i < maxLen; i++) {
          for (const column of row.columns) {
            if (column[i]) interleaved.push(column[i]);
          }
        }
        return { ...row, columns: [interleaved] };
      });
    }

    let lastViewportMode = null;
    function renderPortfolioForViewport() {
      const isMobile = window.matchMedia('(max-width: 768px)').matches;
      if (lastViewportMode === isMobile) return;
      lastViewportMode = isMobile;
      renderPortfolio(getPortfolioRowsForViewport());
    }

    renderPortfolioForViewport();
    window.addEventListener('resize', renderPortfolioForViewport);

    function openLightbox(item) {
      const img = item.querySelector('img');
      const lightboxImg = document.getElementById('lightboxImg');
      lightboxImg.src = img.src;
      // Reset transform/zoom state when opening a new image.
      tx = 0;
      ty = 0;
      s = 1;
      unzoomedRect = null;
      // Reset transform without triggering the transition (otherwise getNaturalRect
      // could be wrong before the animation finishes).
      lightboxImg.classList.add('dragging');
      lightboxImg.style.transform = 'translate(0px, 0px) scale(1)';
      // Force a reflow so the no-transition transform is committed before we
      // remove the dragging class.
      lightboxImg.offsetHeight;
      lightboxImg.classList.remove('zoomed', 'dragging');
      // Compute unzoomedRect once the new image's intrinsic size is known.
      const captureRect = () => { unzoomedRect = computeUnzoomedRect(); };
      if (lightboxImg.complete && lightboxImg.naturalWidth) captureRect();
      else lightboxImg.addEventListener('load', captureRect, { once: true });
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.add('open');
    }

    // Recompute on viewport resize so panning/clamping stays correct.
    window.addEventListener('resize', () => {
      unzoomedRect = computeUnzoomedRect();
    });

    // Transform-based zoom for the lightbox image.
    // The image is transformed as: translate(tx, ty) scale(s) with origin (0, 0).
    // We compute the natural (unzoomed) display rect deterministically from
    // the image's intrinsic size and viewport — never from getBoundingClientRect,
    // which returns mid-animation values during CSS transitions.
    let tx = 0, ty = 0, s = 1;
    let unzoomedRect = null;
    const MIN_SCALE = 1;
    const MAX_SCALE = 8;
    const ELASTIC_DAMPING = 0.2;       // how slowly scale grows past the limits
    const HARD_MAX = MAX_SCALE * 1.16; // absolute ceiling during pinch (~9.3x)
    const HARD_MIN = MIN_SCALE * 0.90; // absolute floor during pinch (0.9x)
    const ZOOM_TARGET_SCALE_VH = 1.3; // double-tap zoom target = 130vh tall

    function applyElastic(rawScale) {
      // Rubber-band: past the limits, scale grows/shrinks at a fraction of the
      // raw input. Caller is responsible for snapping back on gesture end.
      if (rawScale > MAX_SCALE) {
        const overshoot = rawScale - MAX_SCALE;
        return Math.min(HARD_MAX, MAX_SCALE + overshoot * ELASTIC_DAMPING);
      }
      if (rawScale < MIN_SCALE) {
        const undershoot = MIN_SCALE - rawScale;
        return Math.max(HARD_MIN, MIN_SCALE - undershoot * ELASTIC_DAMPING);
      }
      return rawScale;
    }

    function getImg() { return document.getElementById('lightboxImg'); }

    function computeUnzoomedRect() {
      const img = getImg();
      if (!img.naturalWidth || !img.naturalHeight) return null;
      const nw = img.naturalWidth;
      const nh = img.naturalHeight;
      const maxW = window.innerWidth * 0.9;
      const maxH = window.innerHeight * 0.9;
      const ratio = nw / nh;
      let w = nw, h = nh;
      if (w > maxW) { w = maxW; h = w / ratio; }
      if (h > maxH) { h = maxH; w = h * ratio; }
      return {
        left: (window.innerWidth - w) / 2,
        top: (window.innerHeight - h) / 2,
        width: w,
        height: h
      };
    }

    function getNaturalRect() {
      if (!unzoomedRect) unzoomedRect = computeUnzoomedRect();
      return unzoomedRect;
    }

    function clampTranslate(tx, ty, s, nat) {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const scaledW = nat.width * s;
      const scaledH = nat.height * s;
      let outTx, outTy;
      if (scaledW > vw) {
        const maxTx = -nat.left;
        const minTx = vw - nat.left - scaledW;
        outTx = Math.max(minTx, Math.min(maxTx, tx));
      } else {
        outTx = (vw - scaledW) / 2 - nat.left;
      }
      if (scaledH > vh) {
        const maxTy = -nat.top;
        const minTy = vh - nat.top - scaledH;
        outTy = Math.max(minTy, Math.min(maxTy, ty));
      } else {
        outTy = (vh - scaledH) / 2 - nat.top;
      }
      return { tx: outTx, ty: outTy };
    }

    function applyTransform() {
      getImg().style.transform = `translate(${tx}px, ${ty}px) scale(${s})`;
    }

    function setZoomState(newTx, newTy, newScale, animate) {
      // Hard-clamped state setter — used for double-tap, snap-back, and pan.
      const img = getImg();
      const nat = getNaturalRect();
      s = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
      const clamped = clampTranslate(newTx, newTy, s, nat);
      tx = clamped.tx;
      ty = clamped.ty;
      if (!animate) img.classList.add('dragging');
      else img.classList.remove('dragging');
      applyTransform();
      if (s > 1.0001) img.classList.add('zoomed');
      else img.classList.remove('zoomed');
    }

    function setRawTransform(newTx, newTy, newScale) {
      // Unclamped state setter for live pinch — allows elastic overshoot.
      // No clampTranslate so the image can drift out a bit during the gesture;
      // touchend snaps everything back into bounds.
      const img = getImg();
      s = newScale;
      tx = newTx;
      ty = newTy;
      img.classList.add('dragging');
      applyTransform();
      if (s > 1.0001) img.classList.add('zoomed');
      else img.classList.remove('zoomed');
    }

    function snapBackToBounds() {
      // Called on touchend. If scale is within bounds just clamp position.
      if (s >= MIN_SCALE - 0.0001 && s <= MAX_SCALE + 0.0001) {
        setZoomState(tx, ty, s, true);
        return;
      }
      // JS-driven animation instead of CSS transition: recomputes and clamps
      // tx/ty at every frame so the image never drifts off-screen mid-animation,
      // which is what caused the black flash with the CSS transition approach.
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const nat = getNaturalRect();
      const imgX = (cx - nat.left - tx) / s;
      const imgY = (cy - nat.top - ty) / s;
      const startScale = s;
      const targetScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, s));
      const duration = 280;
      const startTime = performance.now();
      const img = getImg();
      img.classList.add('dragging');
      function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
      function step(now) {
        const t = Math.min(1, (now - startTime) / duration);
        const eased = easeOutCubic(t);
        s = startScale + (targetScale - startScale) * eased;
        const rawTx = cx - nat.left - imgX * s;
        const rawTy = cy - nat.top - imgY * s;
        const clamped = clampTranslate(rawTx, rawTy, s, nat);
        tx = clamped.tx;
        ty = clamped.ty;
        applyTransform();
        if (t < 1) { requestAnimationFrame(step); return; }
        img.classList.remove('dragging');
        if (s > 1.0001) img.classList.add('zoomed');
        else img.classList.remove('zoomed');
      }
      requestAnimationFrame(step);
    }

    function zoomToPoint(event) {
      const img = getImg();
      const nat = getNaturalRect();
      const targetScale = (window.innerHeight * ZOOM_TARGET_SCALE_VH) / nat.height;
      // Pivot in viewport coords (where the user tapped):
      const Px = event.clientX, Py = event.clientY;
      // Image-pixel currently under (Px, Py): with scale=1, tx=0, ty=0:
      //   imgPx = Px - nat.left, imgPy = Py - nat.top
      // We want that same imgPx, imgPy to end up at (Px, Py) at new scale.
      //   Px = nat.left + newTx + imgPx * targetScale
      //   newTx = Px - nat.left - (Px - nat.left) * targetScale
      const newTx = (Px - nat.left) * (1 - targetScale);
      const newTy = (Py - nat.top) * (1 - targetScale);
      setZoomState(newTx, newTy, targetScale, true);
    }

    function exitZoom() {
      setZoomState(0, 0, 1, true);
    }

    // Wire up double-tap/double-click, one-finger pan, and two-finger pinch
    // (pinch zooms proportionally and tracks the current finger midpoint).
    (() => {
      const img = getImg();
      let lastTap = 0;

      img.addEventListener('click', event => {
        event.stopPropagation();
        const now = Date.now();
        if (now - lastTap < 350 && lastTap !== 0) {
          if (img.classList.contains('zoomed')) exitZoom();
          else zoomToPoint(event);
          lastTap = 0;
        } else {
          lastTap = now;
        }
      });

      let dragStart = null;
      let pinchStart = null;

      function midpoint(t1, t2) {
        return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
      }
      function distance(t1, t2) {
        return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      }

      img.addEventListener('touchstart', e => {
        if (e.touches.length === 1 && img.classList.contains('zoomed')) {
          const t = e.touches[0];
          dragStart = { x: t.clientX, y: t.clientY, tx, ty };
          img.classList.add('dragging');
        } else if (e.touches.length === 2) {
          dragStart = null;
          const m = midpoint(e.touches[0], e.touches[1]);
          const nat = getNaturalRect();
          // Image-pixel currently under the pinch midpoint — stays anchored
          // to the moving midpoint as the gesture progresses.
          const pivotImgX = (m.x - nat.left - tx) / s;
          const pivotImgY = (m.y - nat.top - ty) / s;
          pinchStart = {
            dist: distance(e.touches[0], e.touches[1]),
            scale: s,
            pivotImgX,
            pivotImgY,
            natLeft: nat.left,
            natTop: nat.top
          };
          img.classList.add('dragging');
        }
      }, { passive: true });

      img.addEventListener('touchmove', e => {
        if (e.touches.length === 1 && dragStart) {
          e.preventDefault();
          const t = e.touches[0];
          const proposedTx = dragStart.tx + (t.clientX - dragStart.x);
          const proposedTy = dragStart.ty + (t.clientY - dragStart.y);
          setZoomState(proposedTx, proposedTy, s, false);
        } else if (e.touches.length === 2 && pinchStart) {
          e.preventDefault();
          const m = midpoint(e.touches[0], e.touches[1]);
          const dist = distance(e.touches[0], e.touches[1]);
          const rawScale = pinchStart.scale * (dist / pinchStart.dist);
          // Apply rubber-banding past the [MIN, MAX] range. Critically, use
          // the elastic (actually-applied) scale — not the raw input — when
          // computing translate, otherwise tx/ty drift while scale is pinned.
          const appliedScale = applyElastic(rawScale);
          const newTx = m.x - pinchStart.natLeft - pinchStart.pivotImgX * appliedScale;
          const newTy = m.y - pinchStart.natTop - pinchStart.pivotImgY * appliedScale;
          setRawTransform(newTx, newTy, appliedScale);
        }
      }, { passive: false });

      img.addEventListener('touchend', e => {
        if (e.touches.length === 0) {
          dragStart = null;
          pinchStart = null;
          // If gesture left scale outside [MIN, MAX] (elastic overshoot),
          // snap-animate back into legal range with bounds clamping.
          snapBackToBounds();
        } else if (e.touches.length === 1) {
          pinchStart = null;
        }
      });

      img.addEventListener('touchcancel', () => {
        dragStart = null;
        pinchStart = null;
        img.classList.remove('dragging');
      });
    })();

    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      exitZoom();
      lightbox.classList.remove('open');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
