<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swedish Wildlife Gallery | GW</title>
  <meta name="description" content="Explore the Swedish Wildlife gallery by GW with bird and nature photography from nearby forests in Stockholm.">

  <meta property="og:description" content="Explore the Swedish Wildlife gallery by GW with bird and nature photography from Stockholm forests.">

  <meta name="twitter:description" content="Wildlife and bird photography gallery from Stockholm forests by GW.">
  <meta name="twitter:image" content="https://gwallinfoto.com/images/great-spotted-woodpecker.jpg">
  <script type="application/ld+json">
  {

      },
      {
        "@type": "BreadcrumbList",
        "@id": "https://gwallinfoto.com/swedish-wildlife/#breadcrumb",
        "itemListElement": [
          {

          },

          },

      {

      },
      {
        "@type": "ImageObject",
        "name": "Roe deer in forest clearing",
        "contentUrl": "https://gwallinfoto.com/images/roe-deer.jpg",

      }
    ]
  }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #f0ece4;
      --gold: #c9a96e;
      --dark: #121212;
      --panel: #161616;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--dark);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 36px 56px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.42), rgba(0,0,0,0));
    }

    .nav-links {
      display: flex;
      gap: 44px;
      list-style: none;
    }

    .nav-links a {
      font-size: 10.5px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(240,236,228,0.85);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-links a:hover { color: var(--gold); }

    .nav-logo {
      text-decoration: none;
      text-align: center;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-logo .name {
      font-family: 'Bodoni Moda', serif;
      font-weight: 300;
      font-size: 24px;
      letter-spacing: 0.18em;
      color: var(--white);
      display: block;
    }

    .nav-logo .tagline {
      font-size: 9px;
      font-weight: 200;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      display: block;
      margin-top: 4px;
    }

    .portfolio {
      padding: 120px 56px;
      background: var(--panel);
      scroll-margin-top: 110px;
    }
.portfolio-gallery {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .portfolio-rows {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .portfolio-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      align-items: start;
    }

    .portfolio-row.row-feature {
      grid-template-columns: 1.15fr 0.95fr 1fr;
    }

    .portfolio-column {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .portfolio-card {
      position: relative;
      width: 100%;
      overflow: hidden;
      cursor: pointer;
      border-radius: 2px;
    }

    .portfolio-card.size-hero { height: 760px; }
    .portfolio-card.size-hero-compact { height: 540px; }
    .portfolio-card.size-tall { height: 560px; }
    .portfolio-card.size-tall-soft { height: 520px; }
    .portfolio-card.size-large { height: 480px; }
    .portfolio-card.size-medium { height: 300px; }
    .portfolio-card.size-small { height: 210px; }
    .portfolio-card.size-solo { height: 620px; }

    .portfolio-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center center;
      filter: brightness(0.88) saturate(0.9);
      transition: transform 0.7s ease, filter 0.5s ease;
    }

    .portfolio-card.focus-center img { object-position: center center; }
    .portfolio-card.focus-top img { object-position: center 22%; }
    .portfolio-card.focus-left img { object-position: 40% 50%; }
    .portfolio-card.focus-right img { object-position: 42% 50%; }
    .portfolio-card.focus-stjartmes img { object-position: 58% 48%; }
    .portfolio-card.focus-koltrast img { object-position: 44% 50%; }
    .portfolio-card.focus-radjur img { object-position: 34% 48%; }
    .portfolio-card.fit-contain img { object-fit: contain; }

    .portfolio-card:hover img {
      transform: scale(1.02);
      filter: brightness(1) saturate(1.05);
    }
.portfolio-row-single { grid-template-columns: 1fr; }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open { display: flex; overflow: hidden; }
    .lightbox.open.zoomed { display: flex; overflow-y: auto; overflow-x: hidden; align-items: flex-start; justify-content: center; }
    .lightbox.open.zoomed .lightbox-close { position: fixed; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: cover;
      cursor: zoom-in;
      transition: transform 0.25s ease;
    }

    .lightbox img.zoomed {
      max-width: 90vw;
      width: auto;
      max-height: none;
      height: 170vh;
      margin: 6vh auto;
      display: block;
      cursor: zoom-out;
      transform: none;
    }

    .lightbox-close {
      position: absolute;
      top: 32px;
      right: 40px;
      background: none;
      border: none;
      color: var(--white);
      font-size: 28px;
      cursor: pointer;
      font-weight: 200;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .lightbox-close:hover { opacity: 1; }

    @media (max-width: 1024px) {
      .portfolio-row { grid-template-columns: repeat(2, 1fr); }
      .portfolio-row.row-feature { grid-template-columns: repeat(2, 1fr); }
      .portfolio-row-single { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      nav { padding: 32px 24px 18px; }
      .nav-logo { top: 22px; }
      .nav-links { display: none; }
      .portfolio { padding: 88px 24px; }
      .portfolio-row { grid-template-columns: 1fr; }
      .portfolio-row.row-feature { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <ul class="nav-links">
      <li><a href="../index.html#home-hero">Home</a></li>
      <li><a href="../portfolio/index.html">Portfolio</a></li>
    </ul>
    <a class="nav-logo" href="../index.html#home-hero" aria-label="Go to home">
      <span class="name">GW</span>
      <span class="tagline">Wildlife &middot; Birds</span>
    </a>
    <ul class="nav-links">
      <li><a href="../index.html#about">About</a></li>
    </ul>
  </nav>

  <section class="portfolio" id="gallery">
<div class="portfolio-gallery">
      <div class="portfolio-rows" id="portfolioRows"></div>
    </div>
  </section>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="event.stopPropagation(); closeLightbox()">&times;</button>
    <img id="lightboxImg" src="" alt="" loading="lazy" decoding="async" onclick="toggleZoom(event)">
  </div>

  <script>
    const portfolioImages = {
      stjartmesInsekt: { src: '../images/long-tailed-tit-with-insect.jpg', alt: 'Long-tailed tit carrying an insect' },
      ekorre: { src: '../images/red-squirrel.jpg', alt: 'Red squirrel on a tree branch' },
      skaggmes: { src: '../images/bearded-reedling.jpg', alt: 'Bearded reedling perched in reeds' },
      spillkraka: { src: '../images/black-woodpecker.jpg', alt: 'Black woodpecker on a tree trunk' },
      notvacka: { src: '../images/eurasian-nuthatch.jpg', alt: 'Eurasian nuthatch on tree bark' },
      tofsmes: { src: '../images/crested-tit.jpg', alt: 'Crested tit perched in conifer forest' },
      blames: { src: '../images/eurasian-jay.jpg', alt: 'Eurasian jay perched on a mossy branch' },
      steglits: { src: '../images/european-goldfinch.jpg', alt: 'European goldfinch among winter branches' },
      tornfalk: { src: '../images/common-kestrel.jpg', alt: 'Common kestrel portrait in natural light' },
      isISol: { src: '../images/crow-on-ice.jpg', alt: 'Crow standing on ice in winter' },
      koltrastISno: { src: '../images/common-blackbird-in-snow.jpg', alt: 'Common blackbird in falling snow' },
      mindreHackspett: { src: '../images/lesser-spotted-woodpecker.jpg', alt: 'Lesser spotted woodpecker on tree trunk' },
      radjur: { src: '../images/roe-deer.jpg', alt: 'Roe deer in a forest clearing' },
      kor: { src: '../images/cattle-in-morning-mist.jpg', alt: 'Cattle in morning mist at dawn' },
      stenknack: { src: '../images/hawfinch.jpg', alt: 'Hawfinch close-up portrait' },
      stjartmesIAl: { src: '../images/long-tailed-tit-in-alder.jpg', alt: 'Long-tailed tit in alder branches' },
      storhack: { src: '../images/great-spotted-woodpecker.jpg', alt: 'Great spotted woodpecker close-up' },
      entita: { src: '../images/willow-tit.jpg', alt: 'Willow tit foraging on the forest floor' }
    };

    const portfolioRows = [
      {
        className: 'row-feature',
        columns: [
          [
            { key: 'stjartmesInsekt', size: 'hero-compact', focus: 'stjartmes' },
            { key: 'tofsmes', size: 'large' },
            { key: 'stjartmesIAl', size: 'large', focus: 'left' },
            { key: 'radjur', size: 'tall-soft', focus: 'radjur' },
            { key: 'storhack', size: 'large', focus: 'center' }
          ],
          [
            { key: 'ekorre', size: 'medium', focus: 'center' },
            { key: 'skaggmes', size: 'medium' },
            { key: 'koltrastISno', size: 'tall', focus: 'koltrast' },
            { key: 'notvacka', size: 'medium' },
            { key: 'kor', size: 'medium' },
            { key: 'blames', size: 'medium' },
            { key: 'entita', size: 'small', focus: 'center' }
          ],
          [
            { key: 'spillkraka', size: 'tall' },
            { key: 'steglits', size: 'medium' },
            { key: 'isISol', size: 'small' },
            { key: 'tornfalk', size: 'medium' },
            { key: 'mindreHackspett', size: 'medium' },
            { key: 'stenknack', size: 'tall' }
          ]
        ]
      }
    ];

    function createPortfolioCard(config) {
      const image = portfolioImages[config.key];
      if (!image) return null;

      const card = document.createElement('div');
      const focusClass = config.focus ? ` focus-${config.focus}` : '';
      const fitClass = config.fit ? ` fit-${config.fit}` : '';
      card.className = `portfolio-card size-${config.size}${focusClass}${fitClass}`;
      card.onclick = () => openLightbox(card);

      const img = document.createElement('img');
      img.src = image.src;
      img.alt = image.alt;
      img.loading = 'lazy';
      img.decoding = 'async';
      card.appendChild(img);
      return card;
    }

    function renderPortfolio(rows) {
      const root = document.getElementById('portfolioRows');
      if (!root) return;
      root.innerHTML = '';

      rows.forEach(row => {
        if (row.single) {
          const section = document.createElement('div');
          section.className = 'portfolio-row portfolio-row-single';
          const card = createPortfolioCard(row.single);
          if (card) section.appendChild(card);
          root.appendChild(section);
          return;
        }

        const section = document.createElement('div');
        section.className = `portfolio-row${row.className ? ` ${row.className}` : ''}`;

        row.columns.forEach(columnCards => {
          const column = document.createElement('div');
          column.className = 'portfolio-column';

          columnCards.forEach(cardConfig => {
            const card = createPortfolioCard(cardConfig);
            if (card) column.appendChild(card);
          });

          section.appendChild(column);
        });

        root.appendChild(section);
      });
    }

    function getPortfolioRowsForViewport() {
      const isMobile = window.matchMedia('(max-width: 768px)').matches;
      if (!isMobile) return portfolioRows;

      return portfolioRows.map(row => {
        if (!row.columns) return row;
        return {
          ...row,
          columns: row.columns.map(columnCards =>
            columnCards.map(cardConfig =>
              cardConfig.key === 'radjur'
                ? { ...cardConfig, key: 'spillkraka' }
                : cardConfig.key === 'spillkraka'
                ? { ...cardConfig, key: 'radjur' }
                : cardConfig
            )
          )
        };
      });
    }

    let lastViewportMode = null;
    function renderPortfolioForViewport() {
      const isMobile = window.matchMedia('(max-width: 768px)').matches;
      if (lastViewportMode === isMobile) return;
      lastViewportMode = isMobile;
      renderPortfolio(getPortfolioRowsForViewport());
    }

    renderPortfolioForViewport();
    window.addEventListener('resize', renderPortfolioForViewport);

    function openLightbox(item) {
      const img = item.querySelector('img');
      const lightboxImg = document.getElementById('lightboxImg');
      lightboxImg.src = img.src;
      lightboxImg.classList.remove('zoomed');
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.remove('zoomed');
      lightbox.classList.add('open');
    }

    function toggleZoom(event) {
      event.stopPropagation();
      const lightboxImg = document.getElementById('lightboxImg');
      const lightbox = document.getElementById('lightbox');
      lightboxImg.classList.toggle('zoomed');
      lightbox.classList.toggle('zoomed');
    }

    function closeLightbox() {
      const lightboxImg = document.getElementById('lightboxImg');
      const lightbox = document.getElementById('lightbox');
      lightboxImg.classList.remove('zoomed');
      lightbox.classList.remove('zoomed');
      lightbox.classList.remove('open');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
